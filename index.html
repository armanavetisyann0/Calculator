<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="./app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <section>
        <div>
            <div class="display">
                <div>
                    <i id="openMemory" class="icon bi bi-clock-history"></i>
                </div>
                <div>
                    <p id="display">0</p>
                </div>
            </div>
            <div id="calculatorButtons">
                <button id="memoryAdd">M+</button>
                <button>%</button>
                <button>C</button>
                <button>⌫</button>

                <button>1/x</button>
                <button>x²</button>
                <button>√x</button>
                <button class="operator">/</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">*</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>

                <button>+/-</button>
                <button>0</button>
                <button>.</button>
                <button class="equal">=</button>
            </div>
        </div>
    </section>

</body>

</html>
